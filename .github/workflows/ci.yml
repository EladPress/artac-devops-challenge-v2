name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Don't run two pipelines for the same branch at once; never cancel a release.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only this job needs write access (to push the changelog + create releases).
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so semantic-release can read tags/commits

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release@24 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            conventional-changelog-conventionalcommits@8

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # head_ref is set on PRs (source branch); ref_name on pushes.
          BRANCH: ${{ github.head_ref || github.ref_name }}
          # Real release only on a direct push to main; everything else previews.
          IS_RELEASE: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        run: |
          if [ "$IS_RELEASE" = "true" ]; then
            npx semantic-release
          else
            echo "Not a push to main — running dry-run preview for '$BRANCH'."
            npx semantic-release --dry-run --branches="$BRANCH"
          fi

  build:
    name: Build Image
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
# TODO: finish all actions versions upgrade and document. amend to last commit faggy
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: app:ci
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  test:
    name: Run Tests
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  security-scan:
    name: Security Scan
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: app:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

  push:
    name: Push Image
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: Normalize registry/image name to lowercase
        run: |
          echo "REGISTRY=${REGISTRY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag app:ci "${REGISTRY}/${IMAGE_NAME}:latest"
          docker tag app:ci "${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}"
          docker push "${REGISTRY}/${IMAGE_NAME}:latest"
          docker push "${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}"

      - name: Delete image artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts" \
            --jq '.artifacts[] | select(.name=="docker-image") | .id' \
          | xargs -I{} gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/{}"

  deploy:
    name: Deploy
    needs: [push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        run: |
          echo "TODO: Implement deployment"
          echo "This step should SSH into the EC2 instance and deploy the new container"
