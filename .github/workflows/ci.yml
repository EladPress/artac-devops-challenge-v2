name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Don't run two pipelines for the same branch at once; never cancel a release.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semantic-release.outputs.new_version }}
    # Only this job needs write access (to push the changelog + create releases).
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so semantic-release can read tags/commits

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release@24 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            conventional-changelog-conventionalcommits@8

      - name: Run semantic-release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release 2>&1 | tee /tmp/sr-output.txt
          new_version=$(grep -oP "(?<=The next release version is )[^\s]+" /tmp/sr-output.txt | head -1 || true)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

  build:
    name: Build Image
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: app:ci
          labels: org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  test:
    name: Run Tests
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  security-scan:
    name: Security Scan
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy vulnerability scanner (full report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: app:ci
          format: table
          output: trivy-results.txt
          exit-code: 0
          ignore-unfixed: true
          severity: LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 30

      - name: Fail on HIGH or CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: app:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  smoke-test:
    name: Smoke Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Start container
        run: docker run -d --name smoke -p 8080:8080 app:ci

      - name: Wait for container to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ready; then
              echo "Container is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become ready in 60s"
          docker logs smoke
          exit 1

      - name: Test /health endpoint
        run: curl --fail http://localhost:8080/health

      - name: Test /predict endpoint
        run: |
          curl --fail -X POST http://localhost:8080/predict \
            -H "Content-Type: application/json" \
            -d '{"text": "This is a great product!"}'

      - name: Stop container
        if: always()
        run: docker stop smoke && docker rm smoke

  push:
    name: Push Image
    needs: [release, test, security-scan, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: Normalize registry/image name to lowercase
        run: |
          echo "REGISTRY=${REGISTRY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push (branch build)
        run: |
          SAFE_BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          BRANCH_TAG="${SAFE_BRANCH}-${{ github.run_number }}"
          docker tag app:ci "${REGISTRY}/${IMAGE_NAME}:${BRANCH_TAG}"
          docker push "${REGISTRY}/${IMAGE_NAME}:${BRANCH_TAG}"

      - name: Tag and push (version)
        if: needs.release.outputs.new_version != ''
        run: |
          docker tag app:ci "${REGISTRY}/${IMAGE_NAME}:${{ needs.release.outputs.new_version }}"
          docker push "${REGISTRY}/${IMAGE_NAME}:${{ needs.release.outputs.new_version }}"

      - name: Delete image artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="docker-image") | .id' \
          | xargs -I{} gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/{}"

  deploy:
    name: Deploy
    needs: [release, push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'il-central-1'
      INSTANCE_NAME: sentiment-api-server
    steps:
      - name: Check deploy is configured
        id: gate
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::notice::AWS credentials not set — skipping live deploy."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.gate.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve image reference (version)
        if: steps.gate.outputs.enabled == 'true' && needs.release.outputs.new_version != ''
        run: |
          REG="${REGISTRY,,}"
          IMG="${IMAGE_NAME,,}"
          TAG="${{ needs.release.outputs.new_version }}"
          echo "IMAGE=${REG}/${IMG}:${TAG}" >> "$GITHUB_ENV"
          echo "Deploying versioned image: ${REG}/${IMG}:${TAG}"

      - name: Resolve image reference (branch fallback)
        if: steps.gate.outputs.enabled == 'true' && needs.release.outputs.new_version == ''
        run: |
          REG="${REGISTRY,,}"
          IMG="${IMAGE_NAME,,}"
          SAFE_BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAG="${SAFE_BRANCH}-${{ github.run_number }}"
          echo "IMAGE=${REG}/${IMG}:${TAG}" >> "$GITHUB_ENV"
          echo "Deploying branch image: ${REG}/${IMG}:${TAG}"

      - name: Find target instance
        if: steps.gate.outputs.enabled == 'true'
        id: find
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId | [0]" \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::notice::No running instance named ${INSTANCE_NAME} found — nothing to deploy to."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found instance: $INSTANCE_ID"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Roll out new container via SSM
        if: steps.gate.outputs.enabled == 'true' && steps.find.outputs.found == 'true'
        run: |
          ID="${{ steps.find.outputs.instance_id }}"
          PARAMS=$(jq -nc --arg img "$IMAGE" '{
            commands: [
              "set -e",
              "docker pull \($img)",
              "docker rm -f sentiment-api 2>/dev/null || true",
              "docker run -d --name sentiment-api --restart unless-stopped -p 8080:8080 \($img)"
            ]
          }')
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${IMAGE}" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" --output text)
          echo "SSM command id: $CMD_ID"
          sleep 5 # let the invocation register before we wait on it
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$ID" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$ID" --query "Status" --output text)
          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$ID" --query "StandardOutputContent" --output text
          if [ "$STATUS" != "Success" ]; then
            echo "----- stderr -----"
            aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$ID" --query "StandardErrorContent" --output text
            echo "::error::Deploy command finished with status: $STATUS"
            exit 1
          fi

      - name: Verify rollout
        if: steps.gate.outputs.enabled == 'true' && steps.find.outputs.found == 'true'
        run: |
          ID="${{ steps.find.outputs.instance_id }}"
          DNS=$(aws ec2 describe-instances --instance-ids "$ID" \
            --query "Reservations[].Instances[].PublicDnsName | [0]" --output text)
          echo "Polling http://$DNS:8080/ready"
          for i in $(seq 1 12); do
            if curl -fsS "http://$DNS:8080/ready" >/dev/null 2>&1; then
              echo "Service is ready."
              exit 0
            fi
            echo "Attempt $i: not ready yet; retrying in 5s..."
            sleep 5
          done
          echo "::error::Service did not become ready within timeout."
          exit 1
