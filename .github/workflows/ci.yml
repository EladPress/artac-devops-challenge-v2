name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Don't run two pipelines for the same branch at once; never cancel a release.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Step 1: Release ───────────────────────────────────────────────────────
  # Runs first. On a push to main it cuts a real release (tag, GitHub release,
  # changelog commit). On any other push/PR it only previews the next version.
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only this job needs write access (to push the changelog + create releases).
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so semantic-release can read tags/commits

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release@24 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            conventional-changelog-conventionalcommits@8

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # head_ref is set on PRs (source branch); ref_name on pushes.
          BRANCH: ${{ github.head_ref || github.ref_name }}
          # Real release only on a direct push to main; everything else previews.
          IS_RELEASE: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        run: |
          if [ "$IS_RELEASE" = "true" ]; then
            npx semantic-release
          else
            echo "Not a push to main — running dry-run preview for '$BRANCH'."
            npx semantic-release --dry-run --branches="$BRANCH"
          fi

  # ── Step 2: CI ────────────────────────────────────────────────────────────
  # Everything below `needs: [release]`, so CI only runs once Release succeeds.
  build:
    name: Build Image
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Only publish the image on a real push to main.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Run Tests
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  security-scan:
    name: Security Scan
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

  deploy:
    name: Deploy
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        run: |
          echo "TODO: Implement deployment"
          echo "This step should SSH into the EC2 instance and deploy the new container"
